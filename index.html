<!DOCTYPE html>
<html lang="bn-BD" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বুকমার্ক লঞ্চপ্যাড | Bookmark Launchpad</title>
    <meta name="description" content="একটি ডাইনামিক এবং কাস্টমাইজযোগ্য বুকমার্ক ম্যানেজার।">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Blur Decorative Elements -->
    <div class="bg-blur-container">
        <div class="bg-blur bg-blur-1"></div>
        <div class="bg-blur bg-blur-2"></div>
    </div>

    <div class="container">
        <!-- Header Controls -->
        <header class="header-controls">
            <div class="logo-wrapper">
                <h1 class="logo-title">🔗\pp&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|__in|&lt;</h1>
                <span
                    class="logo-slogan">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Network
                    Connects
                    You . . .</span>
            </div>
            <div class="control-actions">
                <!-- Editor Mode Toggle -->
                <button id="editor-toggle" class="control-btn-text hidden" aria-label="Toggle Editor Mode">
                    <svg class="control-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                    <span>এডিট মোড / Edit Mode</span>
                </button>
            </div>
        </header>

        <!-- Main Bookmarks Section -->
        <main>
            <div id="bookmarks-grid" class="bookmarks-grid">
                <!-- Bookmarks will be dynamically injected here via JS -->
            </div>

            <!-- Editor Actions Bar (Only visible in Edit Mode) -->
            <div id="editor-actions-bar" class="editor-actions hidden">
                <button id="add-bookmark-btn" class="add-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    <span>নতুন বুকমার্ক যোগ করুন / Add New Bookmark</span>
                </button>
                <button id="export-json-btn" class="export-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                    </svg>
                    <span>কনফিগারেশন কপি করুন / Copy JSON Config</span>
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>© <span id="current-year"></span> MasterABD. All rights reserved.</p>
        </footer>
    </div>

    <!-- Edit Modal Dialog -->
    <div id="bookmark-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2 id="modal-title">বুকমার্ক সম্পাদনা / Edit Bookmark</h2>
            <form id="bookmark-form">
                <input type="hidden" id="bookmark-id">

                <div class="form-group">
                    <label for="bookmark-name">নাম / Bookmark Name</label>
                    <input type="text" id="bookmark-name" required placeholder="যেমন: গুগল, ফেসবুক, ইত্যাদি">
                </div>

                <div class="form-group">
                    <label for="bookmark-url">লিংক / URL (ফাঁকা রাখলে অচল হবে)</label>
                    <input type="url" id="bookmark-url" placeholder="https://example.com">
                </div>

                <div class="form-group-row">
                    <div class="toggle-container">
                        <label class="switch">
                            <input type="checkbox" id="bookmark-visible" checked>
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label">ভিজিটরদের দেখান / Show to Visitors</span>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="modal-delete" class="btn-danger hidden">মুছুন / Delete</button>
                    <div class="modal-main-actions">
                        <button type="button" id="modal-cancel" class="btn-secondary">বাতিল / Cancel</button>
                        <button type="submit" id="modal-save" class="btn-primary">সংরক্ষণ / Save</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Token Modal Dialog -->
    <div id="password-modal" class="modal hidden">
        <div class="modal-overlay" id="password-overlay"></div>
        <div class="modal-content">
            <h2>গিটহাব টোকেন দিন / Enter GitHub Token</h2>
            <form id="password-form">
                <div class="form-group">
                    <label for="password-input">Personal Access Token (PAT)</label>
                    <input type="password" id="password-input" required
                        placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
                    <span id="password-error" class="hidden"
                        style="color: var(--danger); font-size: 0.85rem; margin-top: 0.25rem; display: block;">ভুল
                        টোকেন বা নেটওয়ার্ক এরর! আবার চেষ্টা করুন।</span>
                </div>
                <div class="modal-actions">
                    <div class="modal-main-actions" style="width: 100%;">
                        <button type="button" id="password-cancel" class="btn-secondary" style="flex-grow: 1;">বাতিল /
                            Cancel</button>
                        <button type="submit" class="btn-primary" style="flex-grow: 1;">নিশ্চিত করুন / Submit</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Script File -->
    <script src="script.js"></script>
</body>

</html>
